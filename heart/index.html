<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name='viewport' content='width=device-width, initial-scale=1'>
	<title>Heart</title>
	<style>
		body {
			margin: 0;
			height: 100dvh;
			display: flex;
			justify-content: center;
			align-items: center;
			background: radial-gradient(circle, #333, #000);
			font-family: sans-serif;
		}
		.heart {
			border-radius: 50%;
			width: 300px;
			height: 300px;
			cursor: pointer;
			filter: grayscale(1);
			user-select: none;
		}
		.heart.active{
			filter: drop-shadow(0 0 26px rgba(222, 24, 36, 0.85));
			animation: beat 1s infinite ease-in-out;
		}
		@keyframes beat {
			0%, 100% { transform: scale(1); }
			20% { transform: scale(1.13); }
			35% { transform: scale(1); }
			55% { transform: scale(1.07); }
			70% { transform: scale(1); }
		}
	</style>
</head>
<body>

<img id="btn" class="heart" src="heart.png" draggable="false"/>

	<script>
		let timeout = null;
		function vibrateGamepads(duration, strongMagnitude = 1, weakMagnitude = 1) {
			const gamepads = navigator.getGamepads?.() || [];
			for (const gamepad of gamepads) {
				if (!gamepad) continue;
				const actuators = [
					gamepad.vibrationActuator,
					...(gamepad.hapticActuators || [])
				].filter(Boolean);

				for (const actuator of actuators) {
					if (typeof actuator.playEffect === "function") {
						actuator.playEffect("dual-rumble", {
							startDelay: 0,
							duration,
							strongMagnitude,
							weakMagnitude
						}).catch(() => {});
					} else if (typeof actuator.pulse === "function") {
						actuator.pulse(Math.max(strongMagnitude, weakMagnitude), duration);
					}
				}
			}
		}

		function stopGamepadVibration() {
			const gamepads = navigator.getGamepads?.() || [];
			for (const gamepad of gamepads) {
				if (!gamepad) continue;
				const actuators = [
					gamepad.vibrationActuator,
					...(gamepad.hapticActuators || [])
				].filter(Boolean);
				for (const actuator of actuators) {
					if (typeof actuator.reset === "function") {
						actuator.reset();
					} else if (typeof actuator.playEffect === "function") {
						actuator.playEffect("dual-rumble", {
							startDelay: 0,
							duration: 1,
							strongMagnitude: 0,
							weakMagnitude: 0
						}).catch(() => {});
					} else if (typeof actuator.pulse === "function") {
						actuator.pulse(0, 1);
					}
				}
			}
		}

		function vibrateAll(duration, strongMagnitude = 1, weakMagnitude = 1) {
			navigator.vibrate(duration);
			vibrateGamepads(duration, strongMagnitude, weakMagnitude);
		}

		function heartbeatCycle() {
			vibrateAll(120)
			timeout = setTimeout(() => {
				vibrateAll(80)
				const nextDelay = 700 + Math.random() * 300;
				timeout = setTimeout(heartbeatCycle, nextDelay)
			}, 180)
	}

	const btn = document.getElementById("btn");
	btn.addEventListener("click", () => {
		let isRunning = btn.classList.contains("active")
			if (isRunning) {
				btn.classList.remove("active")
				clearTimeout(timeout)
				navigator.vibrate(0)
				stopGamepadVibration()
			} else {
				btn.classList.add("active")
				heartbeatCycle()
		}
	})
</script>
</body>
</html>
