<!DOCTYPE html>
<html>
<head>
	<title>Repos size</title>
	<meta http-equiv='Content-Type' content='text/html; charset=utf-8'/>
	<meta name='viewport' content='width=device-width, initial-scale=1'>
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
	<script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
	<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
	<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
	<style>
		body{
			margin: 0;
			height: 100dvh;
			font-family: sans-serif;
			text-align: center;
			display: flex;
			flex-direction: column;
		}
		#root{
			height: 100%;
			display: flex;
			flex-direction: column;
		}
		#chart{
			height: 100%;
			flex: 1 1 auto;
			min-height: 0;
			display: flex;
			flex-direction: column;
		}
		#chart input{
			width: 240px;
			align-self: center;
		}
		#chart canvas{
			flex: 1 1 auto;
			min-height: 0;
		}
		.hide{
			display: none !important;
		}
	</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
	const { useEffect, useMemo, useRef, useState } = React;

	function App() {
		const [username, setUsername] = useState('');
		const [repos, setRepos] = useState(null);
		const [slice, setSlice] = useState(50);
		const [loading, setLoading] = useState(false);
		const [error, setError] = useState(false);
		const chartRef = useRef(null);
		const chartInstanceRef = useRef(null);

		useEffect(() => {
			const params = new URLSearchParams(window.location.search);
			const initialUsername = params.get('name') || 'SuperZombi';
			setUsername(initialUsername);
			loadRepos(initialUsername);
		}, []);

		useEffect(() => {
			if (!repos || !chartRef.current) return;

			if (chartInstanceRef.current) {
				chartInstanceRef.current.destroy();
			}

			const labels = repos.slice(0, slice).map((r) => r[0]);
			const data = repos.slice(0, slice).map((r) => r[1]);

			chartInstanceRef.current = new Chart(chartRef.current.getContext('2d'), {
				type: 'bar',
				data: {
					labels,
					datasets: [{
						label: 'Repo Size',
						data,
						backgroundColor: 'rgba(75, 192, 192, 0.6)'
					}]
				},
				options: {
					responsive: true,
					maintainAspectRatio: false,
					indexAxis: 'y',
					scales: {
						x: {
							ticks: {
								callback(value) {
									return humanFileSize(value);
								}
							}
						}
					},
					plugins: {
						legend: {
							display: false
						},
						tooltip: {
							callbacks: {
								label(context) {
									return humanFileSize(context.raw);
								}
							}
						}
					}
				}
			});

			return () => {
				if (chartInstanceRef.current) {
					chartInstanceRef.current.destroy();
					chartInstanceRef.current = null;
				}
			};
		}, [repos, slice]);

		const hasRepos = useMemo(() => Array.isArray(repos) && repos.length > 0, [repos]);

		async function getReposSizes(name) {
			const response = await fetch(`https://api.github.com/users/${name}/repos?per_page=100`);
			if (!response.ok) {
				throw new Error(`HTTP: ${response.status}`);
			}
			const data = await response.json();
			return data
				.map((repo) => [repo.name, repo.size])
				.sort((a, b) => b[1] - a[1]);
		}

		async function loadRepos(name) {
			if (!name) {
				setRepos(null);
				setError(false);
				history.replaceState(null, '', window.location.pathname);
				return;
			}

			const params = new URLSearchParams();
			params.set('name', name);
			history.replaceState(null, '', `${window.location.pathname}?${params.toString()}`);

			setLoading(true);
			setError(false);
			setRepos(null);
			try {
				const data = await getReposSizes(name);
				setRepos(data);
			} catch (e) {
				setError(true);
			} finally {
				setLoading(false);
			}
		}

		function handleSubmit(e) {
			e.preventDefault();
			loadRepos(username.trim());
		}

		return (
			<>
				<h3>GitHub</h3>

				<form onSubmit={handleSubmit}>
					<span>Username:</span>
					<input
						type="text"
						name="username"
						value={username}
						onChange={(e) => setUsername(e.target.value)}
					/>
					<button type="submit">OK</button>
				</form>

				<div id="chart" className={loading || error || !hasRepos ? 'hide' : ''}>
					<input
						type="range"
						min="5"
						max="50"
						value={slice}
						step="1"
						name="slice"
						onChange={(e) => setSlice(Number(e.target.value))}
					/>
					<canvas ref={chartRef}></canvas>
				</div>

				<p id="loader" className={loading ? '' : 'hide'}>
					<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" height="48" fill="#666">
						<path d="M12 1a11 11 0 1 0 11 11A11 11 0 0 0 12 1m0 19a8 8 0 1 1 8-8 8 8 0 0 1-8 8" opacity="0.25"/>
						<path d="M10.14 1.16a11 11 0 0 0-9 8.92A1.6 1.6 0 0 0 2.46 12a1.5 1.5 0 0 0 1.65-1.3 8 8 0 0 1 6.66-6.61A1.4 1.4 0 0 0 12 2.69a1.57 1.57 0 0 0-1.86-1.53">
							<animateTransform attributeName="transform" dur="0.75s" repeatCount="indefinite" type="rotate" values="0 12 12;360 12 12"/>
						</path>
					</svg>
				</p>

				<h3 style={{ color: 'red' }} className={error ? '' : 'hide'} id="error">Error</h3>
			</>
		);
	}

	function humanFileSize(kb) {
		if (kb < 1024) return `${kb} KB`;

		const mb = kb / 1024;
		if (mb < 1024) return `${mb.toFixed(1)} MB`;

		const gb = mb / 1024;
		return `${gb.toFixed(2)} GB`;
	}

	const root = ReactDOM.createRoot(document.getElementById('root'));
	root.render(<App />);
</script>
</body>
</html>
