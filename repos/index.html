<!DOCTYPE html>
<html>
<head>
	<title>Repos size</title>
	<meta http-equiv='Content-Type' content='text/html; charset=utf-8'/>
	<meta name='viewport' content='width=device-width, initial-scale=1'>
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
	<style>
		body{
			margin: 0;
			height: 100dvh;
			font-family: sans-serif;
			display: flex;
			flex-direction: column;
			text-align: center;
		}
		#chart{
			height: 100%;
		}
		#chart input{
			width: 240px;
		}
		.hide{
			display: none;
		}
	</style>
</head>
<body>

<h3>GitHub</h3>

<p>
	<span>Username:</span>
	<input type="text" name="username"/>
	<button id="btn">OK</button>
</p>

<div id="chart">
	<input type="range" value="100" min="5" max="100" step="1" name="slice"/>
	<canvas></canvas>
</div>

<p id="loader" class="hide">
	<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" height="48" fill="#666">
		<path d="M12 1a11 11 0 1 0 11 11A11 11 0 0 0 12 1m0 19a8 8 0 1 1 8-8 8 8 0 0 1-8 8" opacity="0.25"/>
		<path d="M10.14 1.16a11 11 0 0 0-9 8.92A1.6 1.6 0 0 0 2.46 12a1.5 1.5 0 0 0 1.65-1.3 8 8 0 0 1 6.66-6.61A1.4 1.4 0 0 0 12 2.69a1.57 1.57 0 0 0-1.86-1.53">
			<animateTransform attributeName="transform" dur="0.75s" repeatCount="indefinite" type="rotate" values="0 12 12;360 12 12"/>
		</path>
	</svg>
</p>

<h3 style="color: red;" class="hide" id="error">Error</h3>

<script>
	let destroy_chart = null;
	let global_data = null;

	document.querySelector("#btn").addEventListener("click", _=>{main()})
	document.querySelector('input[name="username"]').addEventListener("keydown", event=>{
		if (event.keyCode == 13){main()}
	})
	document.querySelector('input[name="slice"]').addEventListener("change", _=>{
		if (global_data){
			if (destroy_chart){destroy_chart()}
			destroy_chart = buildChart(global_data)
		}
	})
	window.onload = _=>{
		const params = new URLSearchParams(window.location.search)
		const username = params.get("name") || "SuperZombi"
		document.querySelector('input[name="username"]').value = username
		main()
	}

	function main(){
		global_data = null
		if (destroy_chart){destroy_chart()}
		const username = document.querySelector('input[name="username"]').value.trim()
		if (username){
			const params = new URLSearchParams()
			params.set("name", username)
			const newUrl = window.location.pathname + "?" + params.toString();
			history.replaceState(null, "", newUrl)

			document.querySelector("#loader").classList.remove("hide")
			document.querySelector("#error").classList.add("hide")
			document.querySelector('#chart').classList.add("hide")

			getReposSizes(username).then(data=>{
				global_data = data
				destroy_chart = buildChart(data)
				document.querySelector("#loader").classList.add("hide")
				document.querySelector('#chart').classList.remove("hide")
			}).catch(err=>{
				document.querySelector("#loader").classList.add("hide")
				document.querySelector("#error").classList.remove("hide")
			})
		} else {
			history.replaceState(null, "", window.location.pathname)
		}
	}

	async function getReposSizes(username) {
		return fetch(
			`https://api.github.com/users/${username}/repos?per_page=100`
		).then(res=>{
			if (res.ok){
				return res.json()
			}
			throw new Error(`HTTP: ${res.status}`)
		}).then(repos=>{
			return repos.map(repo=>[repo.name, repo.size]).sort((a, b) => b[1] - a[1])
		})
	}

	function buildChart(repos){
		if (destroy_chart){destroy_chart()}

		const slice = document.querySelector('input[name="slice"]').value;

		const labels = repos.slice(0, slice).map(r => r[0])
		const data = repos.slice(0, slice).map(r => r[1])

		const ctx = document.querySelector('#chart canvas').getContext('2d');
		const chart = new Chart(ctx, {
			type: 'bar',
			data: {
				labels: labels,
				datasets: [{
					label: 'Repo Size',
					data: data,
					backgroundColor: 'rgba(75, 192, 192, 0.6)'
				}]
			},
			options: {
				responsive: true,
				maintainAspectRatio: false,
				indexAxis: 'y',
				scales: {
					x: {
						ticks: {
							callback: function(value) {
								return humanFileSize(value);
							}
						}
					}
				},
				plugins: {
					legend: {
						display: false
					},
					tooltip: {
						callbacks: {
							label: function(context) {
								return humanFileSize(context.raw);
							}
						}
					}
				}
			}
		})
		return ()=>{
			chart.destroy()
			destroy_chart = null
		}
	}

	function humanFileSize(kb) {
		if (kb < 1024) return kb + ' KB';
		
		let mb = kb / 1024;
		if (mb < 1024) return mb.toFixed(1) + ' MB';
		
		let gb = mb / 1024;
		return gb.toFixed(2) + ' GB';
	}
</script>
</body>
</html>
