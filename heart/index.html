<!DOCTYPE html>
<html lang="ru">
<head>
	<meta charset="UTF-8">
	<meta name='viewport' content='width=device-width, initial-scale=1'>
	<title>Heart</title>
	<style>
		body {
			margin: 0;
			height: 100vh;
			display: flex;
			justify-content: center;
			align-items: center;
			background: radial-gradient(circle, #1a1a1a, #000);
			font-family: Arial, sans-serif;
		}

		button {
			padding: 25px 50px;
			font-size: 22px;
			border: none;
			border-radius: 16px;
			background: #ff2e63;
			color: white;
			cursor: pointer;
			box-shadow: 0 0 20px rgba(255, 46, 99, 0.6);
			transition: 0.2s;
		}

		button:hover {
			transform: scale(1.05);
			background: #ff0044;
		}

		button:active {
			transform: scale(0.95);
		}
	</style>
</head>
<body>

<button id="btn">Запустить ❤️</button>

<script>
	let isRunning = false;
	let timeout = null;

	// Один цикл сердцебиения (lub-dub)
	function heartbeatCycle() {
		if (!isRunning) return;

		// Первый удар (сильнее)
		navigator.vibrate(120);

		timeout = setTimeout(() => {
			// Второй удар (слабее)
			navigator.vibrate(80);

			// Случайная пауза между ударами (чуть "живее")
			const nextDelay = 700 + Math.random() * 300;

			timeout = setTimeout(heartbeatCycle, nextDelay);
		}, 180); // пауза между lub и dub
	}

	function start() {
		heartbeatCycle();
	}

	function stop() {
		clearTimeout(timeout);
		navigator.vibrate(0);
	}

	const btn = document.getElementById("btn");

	btn.addEventListener("click", () => {
		isRunning = !isRunning;

		if (isRunning) {
			start();
			btn.textContent = "Остановить 💔";
		} else {
			stop();
			btn.textContent = "Запустить ❤️";
		}
	});
</script>

</body>
</html>
