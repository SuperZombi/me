<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name='viewport' content='width=device-width, initial-scale=1'>
	<title>Heart</title>
	<style>
		body {
			margin: 0;
			height: 100dvh;
			display: flex;
			justify-content: center;
			align-items: center;
			background: radial-gradient(circle, #333, #000);
			font-family: sans-serif;
		}
		.heart {
			border-radius: 50%;
			width: 300px;
			height: 300px;
			cursor: pointer;
			filter: grayscale(1);
			user-select: none;
		}
		.heart.active{
			filter: drop-shadow(0 0 26px rgba(222, 24, 36, 0.85));
			animation: beat 1s infinite ease-in-out;
		}
		@keyframes beat {
			0%, 100% { transform: scale(1); }
			20% { transform: scale(1.13); }
			35% { transform: scale(1); }
			55% { transform: scale(1.07); }
			70% { transform: scale(1); }
		}
	</style>
</head>
<body>

<img id="btn" class="heart" src="heart.png" draggable="false"/>

<script>
	let timeout = null;
	function heartbeatCycle() {
		navigator.vibrate(120)
		timeout = setTimeout(() => {
			navigator.vibrate(80)
			const nextDelay = 700 + Math.random() * 300;
			timeout = setTimeout(heartbeatCycle, nextDelay)
		}, 180)
	}

	const btn = document.getElementById("btn");
	btn.addEventListener("click", () => {
		let isRunning = btn.classList.contains("active")
		if (isRunning) {
			btn.classList.remove("active")
			clearTimeout(timeout)
			navigator.vibrate(0)
		} else {
			btn.classList.add("active")
			heartbeatCycle()
		}
	})
</script>
</body>
</html>
